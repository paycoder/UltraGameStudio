services:
  ugs-runner:
    build: .
    image: ugs-remote-runner:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # REQUIRED: set a strong token, then use the same value in the desktop app.
      UGS_RUNNER_TOKEN: ${UGS_RUNNER_TOKEN:?set UGS_RUNNER_TOKEN}
      UGS_RUNNER_MAX_CONCURRENCY: "2"
      UGS_RUNNER_JOB_TIMEOUT: "1800"
      CODEX_HOME: /app/.codex
      # Multi-user email auth. Set UGS_RUNNER_AUTH_MODE=multiuser to require
      # email registration/login + verification codes + per-user project scoping.
      # JWT secret is REQUIRED in multiuser mode (use a long random value).
      UGS_RUNNER_AUTH_MODE: ${UGS_RUNNER_AUTH_MODE:-token}
      UGS_RUNNER_JWT_SECRET: ${UGS_RUNNER_JWT_SECRET:-}
      # Email delivery for verification codes: console (dev) | smtp | api.
      UGS_MAILER: ${UGS_MAILER:-console}
      UGS_MAIL_FROM: ${UGS_MAIL_FROM:-}
      UGS_SES_SMTP_HOST: ${UGS_SES_SMTP_HOST:-}
      UGS_SES_SMTP_PORT: ${UGS_SES_SMTP_PORT:-}
      UGS_SES_SMTP_SECURE: ${UGS_SES_SMTP_SECURE:-}
      UGS_SES_SMTP_USER: ${UGS_SES_SMTP_USER:-}
      UGS_SES_SMTP_PASS: ${UGS_SES_SMTP_PASS:-}
      UGS_SES_SECRET_ID: ${UGS_SES_SECRET_ID:-}
      UGS_SES_SECRET_KEY: ${UGS_SES_SECRET_KEY:-}
      UGS_SES_REGION: ${UGS_SES_REGION:-}
      # Keep model keys on the server (optional — clients may override per job):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - ugs-runner-data:/data

volumes:
  ugs-runner-data:
