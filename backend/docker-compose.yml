services:
  ugs-runner:
    build: .
    image: ugs-remote-runner:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      # REQUIRED: set a strong token, then use the same value in the desktop app.
      UGS_RUNNER_TOKEN: ${UGS_RUNNER_TOKEN:?set UGS_RUNNER_TOKEN}
      UGS_RUNNER_MAX_CONCURRENCY: "2"
      UGS_RUNNER_JOB_TIMEOUT: "1800"
      CODEX_HOME: /app/.codex
      # Keep model keys on the server (optional — clients may override per job):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - ugs-runner-data:/data

volumes:
  ugs-runner-data:
