# skillshare.center —— Nginx 站点配置
# 证书覆盖: skillshare.center, www.skillshare.center
# 部署路径建议: /etc/nginx/conf.d/skillshare.center.conf

# HTTP: 全部 301 跳 HTTPS（备案过审前如需明文展示首页，可临时把 return 改成 root/index）
server {
    listen 80;
    listen [::]:80;
    server_name skillshare.center www.skillshare.center;
    return 301 https://$host$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name skillshare.center www.skillshare.center;

    ssl_certificate     /etc/nginx/ssl/skillshare.center_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/skillshare.center.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# 默认兜底：用 IP 或未知域名（含 ultragamestudio.com）访问时直接关闭连接，
# 避免无证书域名走到错误的 server 块。
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # 默认块也要给证书，否则 443 default_server 无法完成握手
    ssl_certificate     /etc/nginx/ssl/skillshare.center_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/skillshare.center.key;

    return 444;
}
