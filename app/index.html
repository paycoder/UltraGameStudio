<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/icon-256.png" />
    <title>UltraGameStudio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const fallback = 'cherry-dark';
        const supported = new Set([
          'cherry-dark',
          'pencil',
          'cherry-light',
          'midnight',
          'aurora',
          'daylight',
          'ember',
          'campbell',
          'campbell-powershell',
          'one-half-dark',
          'solarized-dark',
        ]);
        try {
          const raw =
            localStorage.getItem('ultragamestudio.appearance.v1') ??
            localStorage.getItem('freeultracode.appearance.v1') ??
            localStorage.getItem('ultragamestudio.appearance.v1');
          const parsed = raw ? JSON.parse(raw) : null;
          const storedId =
            parsed && typeof parsed.stylePresetId === 'string'
              ? parsed.stylePresetId
              : fallback;
          const id = supported.has(storedId) ? storedId : fallback;
          document.documentElement.dataset.ugsStyle = id;
          document.documentElement.classList.add(`ugs-style-${id}`);
        } catch {
          document.documentElement.dataset.ugsStyle = fallback;
          document.documentElement.classList.add(`ugs-style-${fallback}`);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
